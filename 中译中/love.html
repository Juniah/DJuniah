<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专属彩蛋</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        body{
            background:#fef2f6;
            min-height:100vh;
            overflow:hidden;
        }

        /* 情话文字居中 整句淡入 */
        .love-text{
            position:fixed;
            top:35%;
            left:50%;
            transform:translateX(-50%);
            font-size:26px;
            color:#d63384;
            font-weight:bold;
            text-align:center;
            z-index:100;
            opacity:0;
            transition: opacity 1.5s ease;
        }

        /* 亲吻飘落 */
        .kiss{
            position:absolute;
            font-size:32px;
            animation:fall linear forwards;
        }
        @keyframes fall{
            0%{top:-50px;opacity:1;}
            100%{top:100vh;opacity:0;}
        }

        /* 鼠标爱心轨迹 */
        .heart{
            position:absolute;
            font-size:20px;
            color:#ff5e99;
            pointer-events:none;
            animation:heartFade 1s ease-out forwards;
        }
        @keyframes heartFade{
            0%{opacity:1;transform:scale(1);}
            100%{opacity:0;transform:scale(1.6);}
        }
    </style>
</head>
<body>
    <div class="love-text" id="txt"></div>

    <audio id="m" loop autoplay>
        <source src="https://freetestdata.com/wp-content/uploads/2021/09/Free_Test_Data_100KB_MP3.mp3">
    

<script>
// 浪漫音乐
let music = document.getElementById("m");
music.volume = 0.2;

const line1 = "你知道我最喜欢上什么课吗？";
const line2 = "爱上你的每一刻";
let txtBox = document.getElementById("txt");

// 先清空，第一句慢慢淡入
setTimeout(()=>{
    txtBox.innerText = line1;
    txtBox.style.opacity = "1";
}, 500);

// 停顿 2.5秒 淡出
setTimeout(()=>{
    txtBox.style.opacity = "0";
}, 3000);

// 再换第二句 慢慢淡入
setTimeout(()=>{
    txtBox.innerText = line2;
    txtBox.style.opacity = "1";
}, 4000);

// 满屏亲吻雨
for(let a=0;a<50;a++){
    setTimeout(()=>{
        let el = document.createElement("div");
        el.className = "kiss";
        el.innerText = "😘";
        el.style.left = Math.random()*95 + "%";
        el.style.animationDuration = (Math.random()*3+2)+"s";
        document.body.appendChild(el);
        setTimeout(()=>el.remove(),5000);
    },a*120);
}

// 鼠标爱心轨迹
document.addEventListener("mousemove",e=>{
    let h = document.createElement("div");
    h.className = "heart";
    h.innerText = "❤️";
    h.style.left = e.pageX+"px";
    h.style.top = e.pageY+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),1000);
});

// 手机触屏爱心轨迹
document.addEventListener("touchmove",e=>{
    let t = e.touches[0];
    let h = document.createElement("div");
    h.className = "heart";
    h.innerText = "❤️";
    h.style.left = t.pageX+"px";
    h.style.top = t.pageY+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),1000);
});
</script>
</body>
</html>
